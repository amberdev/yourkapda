name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint

      - name: Run Format Check
        run: npm run format:check

  build-and-test:
    runs-on: ubuntu-latest
    needs: code-quality
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v3

      - name: Set image name
        id: meta
        run: echo "image=ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: docker build -t ${{ steps.meta.outputs.image }} .

      - name: Run Tests
        run: docker run --rm ${{ steps.meta.outputs.image }} npm test

  push-image:
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}
          docker build -t $IMAGE .
          docker push $IMAGE
