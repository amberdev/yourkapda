name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - test_pipeline

jobs:

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: npm install
      - name: Run Lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: docker build -t hello-node-app .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Run Tests
        run: |
          docker build -t hello-node-app .
          docker run --rm hello-node-app npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - name: Simulated Deploy
        run: echo "Deploying to test environment..."

  cleanup:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Cleanup
        run: docker system prune -f